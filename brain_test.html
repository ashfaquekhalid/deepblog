<!DOCTYPE html>
<html>
<head>
    <style>body { margin: 0; background: #111; overflow: hidden; }</style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
<script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 8);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);
    const controls = new THREE.OrbitControls(camera, renderer.domElement);

    const brainGroup = new THREE.Group();
    scene.add(brainGroup);
    
    function noise3(x, y, z) {
        return (Math.sin(x*4.1+y*2.3)*Math.cos(y*3.7+z*1.9) + Math.sin(z*5.3+x*1.7)*Math.cos(x*2.9+z*3.1))*0.5;
    }

    // Hemispheres
    const geo = new THREE.SphereGeometry(1.5, 128, 128);
    const pos = geo.attributes.position;
    for (let i = 0; i < pos.count; i++) {
        let x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);
        let r = Math.sqrt(x*x + y*y + z*z);
        let nx = x/r, ny = y/r, nz = z/r;

        // basic scale
        x *= 0.85;
        y *= 1.1;
        z *= 1.3;

        let absX = Math.abs(x);
        let signX = Math.sign(x) || 1;

        // Longitudinal Fissure (split into two hemispheres)
        // create a gap around x=0
        let gap = Math.exp(-absX * 5.0) * Math.max(0, y + 1.0) * 0.5;
        if (absX < 0.6) {
             let flatten = 1.0 - Math.exp(-absX * 8.0);
             x = signX * (0.05 + absX * flatten);
        }

        // Tapering
        if (z > 0) {
            x *= 1.0 - z * 0.15; // Frontal narrowing
            y *= 1.0 - z * 0.05;
        } else {
            x *= 1.0 + z * 0.15; // Occipital narrowing
            y *= 1.0 + z * 0.1;
        }

        // Sylvian fissure (indentation for temporal lobe)
        let sylvian = Math.exp( -Math.pow(y - 0.1, 2)*8 - Math.pow(z - 0.2, 2)*3 );
        if (absX > 0.3) {
            x -= signX * sylvian * 0.25;
            y += sylvian * 0.1;
        }

        // Flatten the bottom slightly
        if (y < -0.8) {
            y = -0.8 + (y + 0.8) * 0.5;
        }

        // Cortical folds
        let fold = noise3(nx*12, ny*12, nz*12) * 0.035;
        let largeFold = noise3(nx*5, ny*5, nz*5) * 0.03;
        x += nx * (fold + largeFold);
        y += ny * (fold + largeFold);
        z += nz * (fold + largeFold);

        pos.setXYZ(i, x, y, z);
    }
    geo.computeVertexNormals();

    const mat = new THREE.MeshStandardMaterial({ 
        color: 0xba68c8, wireframe: true, transparent: true, opacity: 0.3 
    });
    const solidMat = new THREE.MeshStandardMaterial({
        color: 0x222222, roughness: 0.8
    });
    
    brainGroup.add(new THREE.Mesh(geo, mat));
    brainGroup.add(new THREE.Mesh(geo, solidMat));

    const light = new THREE.PointLight(0xffffff, 1);
    light.position.set(5, 5, 5);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x404040));

    function animate() {
        requestAnimationFrame(animate);
        brainGroup.rotation.y += 0.01;
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
